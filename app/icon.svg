<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Tło: amber, lekko zaokrąglone rogi -->
  <rect width="32" height="32" rx="5" fill="#B8651A"/>
  <!-- Cream/paper okrąg -->
  <circle cx="16" cy="16" r="9.5" fill="none" stroke="#F4F0E8" stroke-width="1.75"/>
  <!-- Celownik (4 kreski, nie przechodzą przez kropkę) -->
  <g stroke="#F4F0E8" stroke-width="1.75" stroke-linecap="round">
    <line x1="6.5" y1="16" x2="11" y2="16"/>
    <line x1="21" y1="16" x2="25.5" y2="16"/>
    <line x1="16" y1="6.5" x2="16" y2="11"/>
    <line x1="16" y1="21" x2="16" y2="25.5"/>
  </g>
  <!-- Kropka centralna -->
  <circle cx="16" cy="16" r="2.75" fill="#F4F0E8"/>
</svg>
